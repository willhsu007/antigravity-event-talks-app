<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigQuery 發布說明與推文分享工具</title>
    <!-- 引入 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 50%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-hover-border: rgba(99, 102, 241, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --twitter-color: #1d9bf0;
            --twitter-hover-color: #0c8de4;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* 淺色模式樣式覆寫 */
        body.light-theme {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(0, 0, 0, 0.08);
            --card-hover-border: rgba(99, 102, 241, 0.5);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-color: #4f46e5;
            --accent-gradient: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
        }

        /* 背景流光裝飾 */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -200px;
            left: -100px;
            z-index: -1;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -100px;
            right: -100px;
            z-index: -1;
            pointer-events: none;
        }

        body.light-theme .bg-glow {
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(0,0,0,0) 70%);
        }

        body.light-theme .bg-glow-2 {
            background: radial-gradient(circle, rgba(168, 85, 247, 0.05) 0%, rgba(0,0,0,0) 70%);
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.25rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #c7d2fe, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }

        body.light-theme .brand h1 {
            background: linear-gradient(to right, #0f172a, #312e81, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        /* 按鈕群組 */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* 重新整理按鈕 */
        .btn-refresh {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn-refresh:active {
            transform: translateY(0);
        }

        .btn-refresh svg {
            width: 1.25rem;
            height: 1.25rem;
            fill: currentColor;
            transition: transform 0.5s ease;
        }

        .btn-refresh.loading svg {
            animation: spin 1s linear infinite;
        }

        /* 次要按鈕樣式 */
        .btn-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme .btn-secondary {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.08);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        body.light-theme .btn-secondary:hover {
            background: rgba(0, 0, 0, 0.06);
            border-color: rgba(0, 0, 0, 0.15);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        /* 主題切換專用圓形按鈕 */
        .btn-icon {
            padding: 0.75rem;
            aspect-ratio: 1/1;
            border-radius: 50%;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 主容器 */
        main {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
        }

        /* 搜尋框樣式 */
        .search-container {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 0.6rem 1rem;
            gap: 0.75rem;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        .search-container:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
        }

        .search-icon {
            width: 1.25rem;
            height: 1.25rem;
            fill: var(--text-secondary);
            transition: fill 0.3s ease;
        }

        .search-container:focus-within .search-icon {
            fill: var(--accent-color);
        }

        .search-input {
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 1rem;
            width: 100%;
            font-family: inherit;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .clear-search-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0 0.25rem;
            transition: color 0.2s;
            display: none;
        }

        .clear-search-btn:hover {
            color: var(--text-primary);
        }

        /* 骨架載入動畫 */
        .skeleton-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .skeleton-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            height: 180px;
            position: relative;
            overflow: hidden;
        }

        .skeleton-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 20%, rgba(255,255,255,0.05) 60%, rgba(255,255,255,0) 100%);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* 卡片設計 */
        .note-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.75rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            cursor: pointer;
        }

        .note-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: var(--card-hover-border);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 
                        0 0 15px rgba(99, 102, 241, 0.1);
        }

        body.light-theme .note-card:hover {
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08), 
                        0 0 15px rgba(99, 102, 241, 0.05);
        }

        .note-card.selected {
            border-color: var(--accent-color);
            background: rgba(99, 102, 241, 0.08);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        body.light-theme .note-card.selected {
            background: rgba(99, 102, 241, 0.04);
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .note-date {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.35rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        body.light-theme .note-date {
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.02);
        }

        .note-date svg {
            width: 0.85rem;
            height: 0.85rem;
            fill: currentColor;
        }

        .note-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            font-weight: 600;
            color: #ffffff;
            margin-top: 0.5rem;
            line-height: 1.4;
            transition: color 0.3s ease;
        }

        body.light-theme .note-title {
            color: #0f172a;
        }

        .note-content {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
            word-break: break-word;
            transition: color 0.3s ease;
        }

        /* 渲染內部 HTML (如 code, strong) */
        .note-content code {
            font-family: monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            color: #f43f5e;
            font-size: 0.9em;
        }

        body.light-theme .note-content code {
            background: rgba(0, 0, 0, 0.06);
            color: #e11d48;
        }

        .note-content a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .note-content a:hover {
            text-decoration: underline;
        }

        .note-content p {
            margin-bottom: 0.5rem;
        }

        .note-content ul, .note-content ol {
            padding-left: 1.25rem;
            margin-bottom: 0.5rem;
        }

        /* 卡片底部操作欄 */
        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 0.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }

        body.light-theme .card-actions {
            border-top-color: rgba(0, 0, 0, 0.05);
        }

        .btn-tweet {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--twitter-color);
            color: white;
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-tweet:hover {
            background: var(--twitter-hover-color);
            transform: scale(1.03);
        }

        .btn-tweet svg {
            width: 1rem;
            height: 1rem;
            fill: currentColor;
        }

        .btn-copy {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .btn-copy.copied {
            background: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        .btn-copy svg {
            width: 1rem;
            height: 1rem;
            fill: currentColor;
        }

        /* 錯誤提示 */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
        }

        /* 側邊推文預覽抽屜/彈窗 */
        .tweet-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .tweet-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .tweet-modal-content {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        body.light-theme .tweet-modal-content {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.1);
            color: #0f172a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .tweet-modal.active .tweet-modal-content {
            transform: scale(1);
        }

        .tweet-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tweet-modal-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .btn-close-modal {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .tweet-textarea {
            width: 100%;
            height: 120px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s, background 0.3s ease, color 0.3s ease;
        }

        body.light-theme .tweet-textarea {
            background: #f8fafc;
            border-color: rgba(0, 0, 0, 0.1);
            color: #0f172a;
        }

        .tweet-textarea:focus {
            border-color: var(--accent-color);
        }

        .tweet-char-count {
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .tweet-char-count.warning {
            color: #f59e0b;
        }

        .tweet-char-count.danger {
            color: #ef4444;
        }

        .tweet-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        body.light-theme .btn-cancel {
            background: #f1f5f9;
            border-color: rgba(0, 0, 0, 0.1);
            color: #0f172a;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        body.light-theme .btn-cancel:hover {
            background: #e2e8f0;
        }

        .btn-send-tweet {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--twitter-color);
            color: white;
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-send-tweet:disabled {
            background: rgba(29, 155, 240, 0.5);
            cursor: not-allowed;
        }

        .btn-send-tweet:not(:disabled):hover {
            background: var(--twitter-hover-color);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <header>
        <div class="brand">
            <h1>BigQuery Release Notes</h1>
            <p>即時追蹤 Google BigQuery 更新，精選內容一鍵推文分享</p>
        </div>
        <div class="header-actions">
            <!-- 主題切換按鈕 -->
            <button id="theme-toggle" class="btn-secondary btn-icon" title="切換主題">
                <!-- 太陽圖示 (深色模式) -->
                <svg id="sun-icon" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem; fill: currentColor;">
                    <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
                </svg>
                <!-- 月亮圖示 (淺色模式) -->
                <svg id="moon-icon" viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem; fill: currentColor; display: none;">
                    <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-8.9 8.2-9.8.6-.1 1.2.3 1.3.9.1.6-.2 1.2-.8 1.4-3.5 1.3-5.8 4.7-5.8 8.5 0 5 4 9 9 9 3.8 0 7.2-2.3 8.5-5.8.2-.6.8-.9 1.4-.8.6.1 1 .7.9 1.3-.9 4.7-5 8.3-9.8 8.3z"/>
                </svg>
            </button>
            <button id="export-csv-btn" class="btn-secondary" style="display: none;">
                <svg viewBox="0 0 24 24" style="width: 1.25rem; height: 1.25rem; fill: currentColor;">
                    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
                </svg>
                <span>匯出 CSV</span>
            </button>
            <button id="refresh-btn" class="btn-refresh">
                <svg viewBox="0 0 24 24">
                    <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                <span>重新整理</span>
            </button>
        </div>
    </header>

    <main id="content-area">
        <!-- 搜尋列 -->
        <div class="search-container" id="search-bar-wrap" style="display: none;">
            <svg viewBox="0 0 24 24" class="search-icon">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="text" id="search-input" class="search-input" placeholder="搜尋發布說明標題或內容..." autocomplete="off">
            <button id="clear-search-btn" class="clear-search-btn">&times;</button>
        </div>

        <!-- 骨架載入 -->
        <div class="skeleton-container" id="loading-skeleton">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>
    </main>

    <!-- 推文編輯彈窗 -->
    <div class="tweet-modal" id="tweet-modal">
        <div class="tweet-modal-content">
            <div class="tweet-modal-header">
                <h3 class="tweet-modal-title">準備分享至 X (Twitter)</h3>
                <button class="btn-close-modal" id="close-modal-btn">&times;</button>
            </div>
            <textarea class="tweet-textarea" id="tweet-text" maxlength="280"></textarea>
            <div class="tweet-char-count" id="tweet-char-count">280 / 280 字元</div>
            <div class="tweet-actions">
                <button class="btn-cancel" id="cancel-tweet-btn">取消</button>
                <button class="btn-send-tweet" id="confirm-tweet-btn">
                    <svg viewBox="0 0 24 24" style="width: 1rem; height: 1rem; fill: currentColor;">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    <span>發送推文</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const contentArea = document.getElementById('content-area');
        const refreshBtn = document.getElementById('refresh-btn');
        const exportCsvBtn = document.getElementById('export-csv-btn');
        const themeToggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const skeleton = document.getElementById('loading-skeleton');
        
        // 搜尋相關元素
        const searchBarWrap = document.getElementById('search-bar-wrap');
        const searchInput = document.getElementById('search-input');
        const clearSearchBtn = document.getElementById('clear-search-btn');

        // 彈窗相關元素
        const tweetModal = document.getElementById('tweet-modal');
        const tweetTextarea = document.getElementById('tweet-text');
        const tweetCharCount = document.getElementById('tweet-char-count');
        const confirmTweetBtn = document.getElementById('confirm-tweet-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const cancelTweetBtn = document.getElementById('cancel-tweet-btn');

        let currentNotes = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化主題
            initTheme();

            fetchReleaseNotes();
            
            refreshBtn.addEventListener('click', () => {
                fetchReleaseNotes();
            });

            // 匯出 CSV 按鈕事件
            exportCsvBtn.addEventListener('click', () => {
                exportToCSV();
            });

            // 主題切換事件
            themeToggleBtn.addEventListener('click', () => {
                toggleTheme();
            });

            // 搜尋輸入監聽
            searchInput.addEventListener('input', () => {
                handleSearch();
            });

            // 清除搜尋按鈕點擊
            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                handleSearch();
                searchInput.focus();
            });

            // 關閉彈窗
            closeModalBtn.addEventListener('click', closeTweetModal);
            cancelTweetBtn.addEventListener('click', closeTweetModal);
            tweetModal.addEventListener('click', (e) => {
                if (e.target === tweetModal) closeTweetModal();
            });

            // 推文字數監聽
            tweetTextarea.addEventListener('input', updateCharCount);

            // 送出推文 (開啟 Web Intent)
            confirmTweetBtn.addEventListener('click', () => {
                const text = tweetTextarea.value;
                const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
                window.open(twitterUrl, '_blank', 'width=600,height=400');
                closeTweetModal();
            });
        });

        // 初始化主題設定
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                document.body.classList.remove('light-theme');
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        }

        // 切換主題
        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-theme');
            if (isLight) {
                localStorage.setItem('theme', 'light');
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                localStorage.setItem('theme', 'dark');
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        }

        // 前端搜尋過濾邏輯
        function handleSearch() {
            const query = searchInput.value.trim().toLowerCase();
            
            // 顯示/隱藏清除按鈕
            clearSearchBtn.style.display = query.length > 0 ? 'block' : 'none';
            
            if (query.length === 0) {
                renderNotes(currentNotes);
                return;
            }
            
            const filtered = currentNotes.filter(note => {
                const titleMatch = note.title.toLowerCase().includes(query);
                const contentMatch = note.content.toLowerCase().includes(query);
                return titleMatch || contentMatch;
            });
            
            renderNotes(filtered, true);
        }

        // 取得 Release Notes
        async function fetchReleaseNotes() {
            showLoading(true);
            
            // 重設搜尋狀態
            searchInput.value = '';
            clearSearchBtn.style.display = 'none';
            searchBarWrap.style.display = 'none';

            try {
                const response = await fetch('/api/release-notes');
                const result = await response.json();
                
                if (result.status === 'success') {
                    currentNotes = result.data;
                    renderNotes(currentNotes);
                    
                    // 顯示/隱藏 CSV 與搜尋框
                    if (currentNotes.length > 0) {
                        exportCsvBtn.style.display = 'flex';
                        searchBarWrap.style.display = 'flex';
                    } else {
                        exportCsvBtn.style.display = 'none';
                        searchBarWrap.style.display = 'none';
                    }
                } else {
                    renderError(result.message || '無法載入更新日誌');
                    exportCsvBtn.style.display = 'none';
                    searchBarWrap.style.display = 'none';
                }
            } catch (error) {
                renderError('連線伺服器失敗，請稍後再試。');
                exportCsvBtn.style.display = 'none';
                searchBarWrap.style.display = 'none';
            } finally {
                showLoading(false);
            }
        }

        // 顯示/隱藏 Loading 狀態
        function showLoading(isLoading) {
            if (isLoading) {
                refreshBtn.classList.add('loading');
                refreshBtn.disabled = true;
                exportCsvBtn.disabled = true;
                
                // 保留搜尋框，但移除舊卡片，顯示 skeleton
                document.querySelectorAll('.note-card, .error-message').forEach(el => el.remove());
                contentArea.appendChild(skeleton);
                skeleton.style.display = 'flex';
            } else {
                refreshBtn.classList.remove('loading');
                refreshBtn.disabled = false;
                exportCsvBtn.disabled = false;
                skeleton.style.display = 'none';
            }
        }

        // 渲染發布說明
        // isSearching: 標記是否為搜尋過濾結果，用於顯示無結果的提示
        function renderNotes(notes, isSearching = false) {
            // 移除舊的卡片與錯誤訊息
            document.querySelectorAll('.note-card, .error-message').forEach(el => el.remove());

            if (notes.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'error-message';
                emptyMsg.textContent = isSearching ? '沒有找到符合搜尋條件的發布說明。' : '目前沒有任何發布說明。';
                contentArea.appendChild(emptyMsg);
                return;
            }

            notes.forEach((note, index) => {
                const card = document.createElement('div');
                card.className = 'note-card';
                
                // 格式化日期
                const dateStr = formatDate(note.updated);
                
                card.innerHTML = `
                    <div class="note-header">
                        <div class="note-date">
                            <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2zm-7 5h5v5h-5z"/></svg>
                            <span>${dateStr}</span>
                        </div>
                    </div>
                    <h2 class="note-title">${note.title}</h2>
                    <div class="note-content">${note.content}</div>
                    <div class="card-actions">
                        <button class="btn-copy">
                            <svg viewBox="0 0 24 24">
                                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                            </svg>
                            <span>複製內容</span>
                        </button>
                        <button class="btn-tweet" data-title="${encodeURIComponent(note.title)}" data-link="${encodeURIComponent(note.link)}">
                            <svg viewBox="0 0 24 24">
                                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                            </svg>
                            <span>分享至 X</span>
                        </button>
                    </div>
                `;

                // 點擊卡片選取
                card.addEventListener('click', (e) => {
                    // 如果點到的是連結或任何按鈕本身，不觸發選取效果
                    if (e.target.closest('a') || e.target.closest('.btn-tweet') || e.target.closest('.btn-copy')) return;
                    
                    document.querySelectorAll('.note-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                });

                // 綁定複製按鈕事件
                const copyBtn = card.querySelector('.btn-copy');
                copyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(note, copyBtn);
                });

                // 綁定分享按鈕事件
                const tweetBtn = card.querySelector('.btn-tweet');
                tweetBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openTweetModal(note.title, note.link);
                });

                contentArea.appendChild(card);
            });
        }

        // 複製到剪貼簿功能
        function copyToClipboard(note, button) {
            // 清理 HTML tag
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = note.content;
            const plainContent = (tempDiv.textContent || tempDiv.innerText || "").trim();
            const dateStr = formatDate(note.updated);
            
            const textToCopy = `📅 發布日期: ${dateStr}\n📌 標題: ${note.title}\n🔗 連結: ${note.link}\n\n📝 詳細更新內容:\n${plainContent}`;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const span = button.querySelector('span');
                const originalText = span.textContent;
                button.classList.add('copied');
                span.textContent = '已複製！';
                
                setTimeout(() => {
                    button.classList.remove('copied');
                    span.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('複製失敗:', err);
                alert('複製失敗，請手動選取複製。');
            });
        }

        // 匯出 CSV 功能
        function exportToCSV() {
            if (!currentNotes || currentNotes.length === 0) return;
            
            // CSV 標頭
            const headers = ['發布日期', '標題', '詳細內容', '連結'];
            
            const rows = currentNotes.map(note => {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = note.content;
                const plainContent = (tempDiv.textContent || tempDiv.innerText || "").trim();
                
                return [
                    formatDate(note.updated),
                    note.title,
                    plainContent,
                    note.link
                ].map(field => {
                    // 處理 CSV 的雙引號與逗號，轉義雙引號
                    const escaped = field.replace(/"/g, '""');
                    return `"${escaped}"`;
                }).join(',');
            });
            
            // 加上 BOM (\ufeff) 避免中文在 Excel 開啟時產生亂碼
            const csvContent = "\ufeff" + [headers.join(','), ...rows].join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.setAttribute('href', url);
            link.setAttribute('download', `BigQuery_Release_Notes_${new Date().toISOString().slice(0,10)}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 渲染錯誤
        function renderError(message) {
            // 移除舊的卡片與錯誤訊息
            document.querySelectorAll('.note-card, .error-message').forEach(el => el.remove());
            
            const errDiv = document.createElement('div');
            errDiv.className = 'error-message';
            errDiv.textContent = `錯誤：${message}`;
            contentArea.appendChild(errDiv);
        }

        // 格式化日期格式 (將 ISO 格式轉換成可讀格式)
        function formatDate(isoString) {
            if (!isoString) return '未知日期';
            try {
                const date = new Date(isoString);
                return date.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
            } catch (e) {
                return isoString;
            }
        }

        // 開啟推文編輯彈窗
        function openTweetModal(title, link) {
            // 清理 HTML tag
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = title;
            const plainTitle = tempDiv.textContent || tempDiv.innerText || "";
            
            // 預設推文內容
            const tweetTemplate = `🔥 Google BigQuery 更新：${plainTitle}\n\n詳細內容請見：${link}\n#BigQuery #GoogleCloud`;
            
            tweetTextarea.value = tweetTemplate;
            updateCharCount();
            
            tweetModal.classList.add('active');
            tweetTextarea.focus();
        }

        // 關閉推文編輯彈窗
        function closeTweetModal() {
            tweetModal.classList.remove('active');
        }

        // 更新字數統計
        function updateCharCount() {
            const count = tweetTextarea.value.length;
            const remaining = 280 - count;
            tweetCharCount.textContent = `${count} / 280 字元`;
            
            if (remaining < 0) {
                tweetCharCount.className = 'tweet-char-count danger';
                confirmTweetBtn.disabled = true;
            } else if (remaining < 30) {
                tweetCharCount.className = 'tweet-char-count warning';
                confirmTweetBtn.disabled = false;
            } else {
                tweetCharCount.className = 'tweet-char-count';
                confirmTweetBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
